App\Entity\Review:
    constraints:
        - Symfony\Bridge\Doctrine\Validator\Constraints\UniqueEntity:
            fields: [student, course]
            message: 'You have already reviewed this course.'
    properties:
        rating:
            - Range: { min: 1, max: 5 }
        comment:
            - NotBlank: ~
            - Length: { min: 10 }
        course:
            - NotNull: ~
        student:
            - NotNull: ~
