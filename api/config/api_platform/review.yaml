resources:
    App\Entity\Review:
        -   uriTemplate: /courses/{courseUuid}/reviews
            uriVariables:
                courseUuid:
                    fromClass: App\Entity\Course
                    toProperty: course
                    identifiers: [ uuid ]
            normalizationContext:
                groups: [ 'review:list' ]
            denormalizationContext:
                groups: [ 'review:write' ]
            operations:
                ApiPlatform\Metadata\GetCollection:
                    cacheHeaders:
                        shared_max_age: 600
                        max_age: 30
                ApiPlatform\Metadata\Post: ~

        -   uriTemplate: /courses/{courseUuid}/reviews/{reviewUuid}
            uriVariables:
                courseUuid:
                    fromClass: App\Entity\Course
                    toProperty: course
                    identifiers: [ uuid ]
                reviewUuid:
                    fromClass: App\Entity\Review
                    identifiers: [ uuid ]
            normalizationContext:
                groups: [ 'review:read' ]
            operations:
                ApiPlatform\Metadata\Get:
                    cacheHeaders:
                        shared_max_age: 600
                        max_age: 30
                ApiPlatform\Metadata\Patch: ~
                ApiPlatform\Metadata\Delete: ~
properties:
    App\Entity\Review:
        id:
            identifier: false
        uuid:
            identifier: true
